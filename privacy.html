<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIVACY POLICY | Fasmo Games</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nosifer&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #ff003c;
            --dim-red: #590015;
            --bg-black: #050505;
            --text-mono: 'Share Tech Mono', monospace;
            --text-horror: 'Nosifer', cursive;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-black);
            color: #ccc;
            font-family: var(--text-mono);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px; pointer-events: none; z-index: 1000;
        }
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.9) 100%);
            pointer-events: none; z-index: 999;
        }

        .doc-container {
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid #333;
            background: rgba(10, 10, 10, 0.95);
            padding: 40px;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        h1 {
            font-family: var(--text-horror);
            color: var(--primary-red);
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
            border-bottom: 2px solid var(--primary-red);
            padding-bottom: 20px;
        }

        .meta-info {
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 40px;
            font-family: monospace;
        }

        h2 {
            color: #fff;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 1.3rem;
            text-transform: uppercase;
            border-left: 3px solid var(--primary-red);
            padding-left: 10px;
            background: linear-gradient(90deg, rgba(255,0,60,0.1) 0%, rgba(0,0,0,0) 100%);
        }

        h3 {
            color: #eee;
            font-size: 1.1rem;
            margin-top: 20px;
            margin-bottom: 10px;
            text-decoration: underline;
            text-decoration-color: #333;
        }

        p, ul { margin-bottom: 15px; font-size: 0.95rem; }
        ul { list-style: inside square; padding-left: 10px; }
        li { margin-bottom: 5px; color: #aaa; }
        
        a { color: var(--primary-red); transition: color 0.3s;}
        a:hover { color: #fff; text-shadow: 0 0 5px var(--primary-red); }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #fff;
            text-decoration: none;
            border: 1px solid #444;
            padding: 5px 15px;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .back-btn:hover { border-color: var(--primary-red); color: var(--primary-red); }

        @media (max-width: 600px) {
            .doc-container { padding: 20px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div class="doc-container">
        <a href="index.html" class="back-btn" data-lang="btn_back">&lt; RETURN TO HOME</a>
        
        <h1 data-lang="title">PRIVACY POLICY</h1>
        <div class="meta-info">
            DOC_ID: FASMO-01 // <span data-lang="last_update">EFFECTIVE: MAY 14 2026</span>
        </div>

        <div id="content"></div>

        <div style="margin-top: 50px; border-top: 1px solid #333; padding-top: 20px; font-size: 0.8rem; text-align: center; color: #555;">
            <span data-lang="footer_contact">CONTACT: fasmo.contact@gmail.com</span>
        </div>
    </div>

    <script>
        const contentData = {
            'en': `
                <p>This Privacy Policy explains how <strong>Fasmo</strong> ("we," "our," or "us") collects, uses, and shares your information when you play our games (the "App"). We are committed to protecting your privacy while providing a high-quality gaming experience.</p>
                <p>By downloading and playing our games, you agree to the collection and use of information in accordance with this policy.</p>
                
                <h2>1. Information We Collect</h2>
                <p>We use third-party SDKs that automatically collect data to support app functionality, advertising, and performance analytics.</p>

                <h3>A. Data Collected Automatically (Third-Party Services)</h3>
                <ul>
                    <li><strong>Device & Other Identifiers:</strong> We collect your Advertising ID (GAID), IP address, and unique device model identifiers to provide personalized ads and prevent fraud.</li>
                    <li><strong>Approximate Location Data:</strong> General location data (derived from IP address) is used to serve relevant advertisements.</li>
                    <li><strong>App Activity & Interactions:</strong> We collect data on <strong>App Interactions</strong>, such as ad views and clicks, to manage advertising frequency and verify engagement.</li>
                    <li><strong>Performance & Diagnostics:</strong> We collect <strong>Crash Logs</strong> and <strong>Diagnostic data</strong> (such as battery usage and loading times) to identify and fix technical issues.</li>
                </ul>

                <h3>B. In-App Purchases</h3>
                <p>Transactions are processed via the Google Play Store. While we do not collect or store your financial information, we collect <strong>Purchase History</strong> data to verify transactions and deliver purchased digital content to your account.</p>

                <h2>2. Third-Party Services</h2>
                <p>We share data with the following independent partners to deliver ads and analyze performance. We encourage you to review their privacy policies:</p>
                <ul>
                    <li><strong>Google AdMob (Advertising):</strong> AdMob uses unique identifiers to serve personalized ads and prevent fraudulent clicks.</li>
                    <li><strong>Unity IAP & Ads (Purchases and Advertising):</strong> Unity services collect data to manage in-game transactions and provide video advertisements.</li>
                    <li><strong>Google Play Services:</strong> Used for app functionality, achievements, and cloud saves.</li>
                </ul>

                <h2>3. Data Handling & Security</h2>
                <p>All data collected is <strong>encrypted in transit</strong> using modern security protocols (HTTPS/TLS). We do not provide a method for account creation or manual data deletion within the App at this time.</p>

                <h2>4. Children's Privacy</h2>
                <p>Our games are not directed at children under the age of 13. We do not knowingly collect personal information from children. If you believe we have inadvertently collected data from a child, please contact us immediately.</p>

                <h2>5. Contact Us</h2>
                <p>If you have questions regarding this policy, please contact us at <strong>fasmo.contact@gmail.com</strong>.</p>
            `,
            'es': `
                <p>Esta Política de Privacidad explica cómo <strong>Fasmo</strong> ("nosotros") recopila, utiliza y comparte su información al jugar a nuestros juegos (la "App"). Estamos comprometidos con su privacidad para asegurar una experiencia de juego de alta calidad.</p>
                <p>Al descargar y jugar a nuestros juegos, acepta la recopilación y uso de información de acuerdo con esta política.</p>
                
                <h2>1. Información que Recopilamos</h2>
                <p>Utilizamos SDKs de terceros que recopilan datos automáticamente para el funcionamiento de la app, publicidad y análisis de rendimiento.</p>

                <h3>A. Datos Recopilados Automáticamente</h3>
                <ul>
                    <li><strong>Identificadores del Dispositivo:</strong> Recopilamos su ID de publicidad (GAID), dirección IP e identificadores de modelo para publicidad personalizada y prevención de fraude.</li>
                    <li><strong>Ubicación Aproximada:</strong> Datos generales de ubicación (basados en IP) se utilizan para mostrar anuncios relevantes.</li>
                    <li><strong>Actividad de la App:</strong> Recopilamos datos sobre <strong>Interacciones con la App</strong>, como anuncios vistos y clics, para gestionar la publicidad y verificar el compromiso.</li>
                    <li><strong>Rendimiento y Diagnóstico:</strong> Recopilamos <strong>Registros de fallos (Crash logs)</strong> y <strong>datos de diagnóstico</strong> para identificar y solucionar problemas técnicos.</li>
                </ul>

                <h3>B. Compras Integradas</h3>
                <p>Las transacciones son procesadas por Google Play Store. Recopilamos el <strong>Historial de compras</strong> para verificar transacciones y entregar el contenido digital comprado.</p>

                <h2>2. Servicios de Terceros</h2>
                <p>Compartimos datos con los siguientes socios para publicidad y análisis de rendimiento:</p>
                <ul>
                    <li><strong>Google AdMob:</strong> Publicidad personalizada y prevención de fraude.</li>
                    <li><strong>Unity IAP & Ads:</strong> Gestión de compras integradas y anuncios de video.</li>
                    <li><strong>Google Play Services:</strong> Funcionalidad de la app, logros y guardado en la nube.</li>
                </ul>

                <h2>3. Manejo de Datos y Seguridad</h2>
                <p>Todos los datos recopilados están <strong>encriptados en tránsito</strong> mediante protocolos de seguridad modernos (HTTPS/TLS). No ofrecemos creación de cuentas ni eliminación manual de datos dentro de la App en este momento.</p>

                <h2>4. Privacidad Infantil</h2>
                <p>Nuestros juegos no están dirigidos a niños menores de 13 años. No recopilamos conscientemente información personal de niños.</p>

                <h2>5. Contacto</h2>
                <p>Si tiene preguntas sobre esta política, contáctenos en <strong>fasmo.contact@gmail.com</strong>.</p>
            `
        };

        const uiTranslations = {
            'en': { title: "PRIVACY POLICY", btn_back: "< RETURN TO HOME", last_update: "EFFECTIVE: MAY 14 2026", footer_contact: "CONTACT: fasmo.contact@gmail.com" },
            'es': { title: "POLITICA DE PRIVACIDAD", btn_back: "< VOLVER A INICIO", last_update: "VIGENCIA: 14 MAY 2026", footer_contact: "CONTACTO: fasmo.contact@gmail.com" }
        };

        function setLanguage(lang) {
            if (!contentData[lang]) lang = 'en';
            document.getElementById('content').innerHTML = contentData[lang];
            document.querySelectorAll('[data-lang]').forEach(el => {
                const key = el.getAttribute('data-lang');
                if (uiTranslations[lang][key]) {
                    el.innerText = uiTranslations[lang][key];
                }
            });
            document.documentElement.lang = lang;
        }

        (function() {
            const userLang = navigator.language || navigator.userLanguage; 
            const langCode = userLang.split('-')[0];
            setLanguage(langCode);
        })();
    </script>
</body>
</html>
